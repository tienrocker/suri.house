name: Build and Deploy

on:
  push:
    branches: [main, master]

jobs:
  build:
    # Giai đoạn 1: Build thử trên máy ảo GitHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy:
    # Giai đoạn 2: Chỉ chạy nếu build thành công
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Sync and Deploy on Server
        run: |
          # Chuyển đến thư mục chứa code production trên server
          cd /root/docker-web

          echo "📥 Pulling latest code..."
          git -C nodejs/suri.house pull origin main

          echo "🚀 Running zero-downtime update..."
          bash suri.house-zero-downtime.sh
